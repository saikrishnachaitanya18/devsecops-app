name: SonarQube Scan

on:
  push:
    branches:
      - development

jobs:
  sonar:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Run Sonar Scanner
        run: |
          sonar-scanner \
            -Dsonar.projectKey=devsecops-app \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.branch.name=development