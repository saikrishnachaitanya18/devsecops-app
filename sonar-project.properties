sonar.projectKey=devsecops-app
sonar.projectName=DevSecOps Vulnerable Application
sonar.projectVersion=1.0

# Define the sources to scan. We explicitly list directories to ensure SonarQube doesn't skip them.
sonar.sources=app.js,routes

# Exclude node modules and test files from the scan
sonar.exclusions=node_modules/**,public/**,views/**,**/*.test.js

# Language settings
sonar.javascript.environments=node
